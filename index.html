<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 我的小游戏集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: title-glow 2s ease-in-out infinite alternate;
            text-align: center;
        }
        
        @keyframes title-glow {
            from { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            to { text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 60px rgba(147, 112, 219, 0.6); }
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            margin-bottom: 3rem;
            text-align: center;
        }
        
        .cards-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 1rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            width: 300px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }
        
        .card:hover::before {
            left: 100%;
        }
        
        .card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .card-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            display: block;
            animation: bounce 2s ease-in-out infinite;
        }
        
        .card:nth-child(1) .card-icon { animation-delay: 0s; }
        .card:nth-child(2) .card-icon { animation-delay: 0.3s; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .card-title {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .card-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .card-1:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
        }
        
        .card-2:hover {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.3), rgba(255, 20, 147, 0.3));
        }
        
        .footer {
            position: fixed;
            bottom: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        
        .floating-element {
            position: fixed;
            font-size: 2rem;
            animation: float-around 15s linear infinite;
            opacity: 0.3;
            pointer-events: none;
        }
        
        @keyframes float-around {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        
        .maze-preview {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }
        
        .heart-preview {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff1493 100%);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }
        
        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .cards-container { flex-direction: column; align-items: center; }
            .card { width: 90%; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="floating-element" style="left: 10%; animation-duration: 20s;">🎮</div>
    <div class="floating-element" style="left: 30%; animation-duration: 25s; animation-delay: 5s;">🎯</div>
    <div class="floating-element" style="left: 50%; animation-duration: 18s; animation-delay: 2s;">⭐</div>
    <div class="floating-element" style="left: 70%; animation-duration: 22s; animation-delay: 8s;">💖</div>
    <div class="floating-element" style="left: 90%; animation-duration: 24s; animation-delay: 4s;">🎨</div>
    
    <h1>🎮 我的小游戏集合</h1>
    <p class="subtitle">点击卡片开始游戏</p>
    
    <div class="cards-container">
        <a href="index.html" class="card card-1" style="text-decoration: none;">
            <div class="maze-preview">🧩</div>
            <span class="card-title">迷宫冒险</span>
            <p class="card-desc">
                使用DFS算法生成的随机迷宫<br>
                支持键盘和触摸操作<br>
                三种难度挑战<br>
                ⭐ 计时&步数统计
            </p>
        </a>
        
        <a href="love-heart.html" class="card card-2" style="text-decoration: none;">
            <div class="heart-preview">💖</div>
            <span class="card-title">炫酷爱心</span>
            <p class="card-desc">
                精美的爱心动画效果<br>
                点击触发惊喜<br>
                粒子特效+爱心雨<br>
                ❤️ 送给特别的人
            </p>
        </a>
    </div>
    
    <p class="footer">Made with ❤️ | 2026</p>
    
    <script>
        const starsContainer = document.getElementById('stars');
        const starCount = 100;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = Math.random() * 2 + 2 + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
