<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 我的小游戏集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: title-glow 2s ease-in-out infinite alternate;
            text-align: center;
        }
        
        @keyframes title-glow {
            from { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            to { text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 60px rgba(147, 112, 219, 0.6); }
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            margin-bottom: 3rem;
            text-align: center;
        }
        
        .cards-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 1rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            width: 300px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }
        
        .card:hover::before {
            left: 100%;
        }
        
        .card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .card-title {
            color: #fff;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }
        
        .card-1 .card-title {
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-2 .card-title {
            background: linear-gradient(45deg, #ff6b6b, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.8;
        }
        
        .card-1:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
        }
        
        .card-2:hover {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.3), rgba(255, 20, 147, 0.3));
        }
        
        .card-arrow {
            display: inline-block;
            margin-top: 1rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .card:hover .card-arrow {
            color: #fff;
            transform: translateX(10px);
        }
        
        .footer {
            position: fixed;
            bottom: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        
        .floating-text {
            position: fixed;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.15);
            animation: float-around 20s linear infinite;
            pointer-events: none;
            font-weight: bold;
        }
        
        @keyframes float-around {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        
        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .cards-container { flex-direction: column; align-items: center; }
            .card { width: 90%; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="floating-text" style="left: 5%; animation-duration: 18s;">游戏</div>
    <div class="floating-text" style="left: 25%; animation-duration: 22s; animation-delay: 3s;">迷宫</div>
    <div class="floating-text" style="left: 45%; animation-duration: 20s; animation-delay: 6s;">爱心</div>
    <div class="floating-text" style="left: 65%; animation-duration: 24s; animation-delay: 2s;">冒险</div>
    <div class="floating-text" style="left: 85%; animation-duration: 19s; animation-delay: 5s;">快乐</div>
    
    <h1>🎮 我的小游戏</h1>
    <p class="subtitle">点击卡片开始游戏</p>
    
    <div class="cards-container">
        <a href="maze-adventure.html" class="card card-1">
            <div class="card-title">迷宫冒险</div>
            <p class="card-desc">
                随机生成的迷宫地图<br>
                支持键盘和触摸操作<br>
                三种难度等级<br>
                计时与步数统计
            </p>
            <span class="card-arrow">→ 立即开始</span>
        </a>
        
        <a href="love-heart.html" class="card card-2">
            <div class="card-title">炫酷爱心</div>
            <p class="card-desc">
                精美爱心动画效果<br>
                点击触发惊喜特效<br>
                粒子+爱心雨<br>
                送给特别的人
            </p>
            <span class="card-arrow">→ 立即体验</span>
        </a>
    </div>
    
    <p class="footer">Made with ❤️ | 2026</p>
    
    <script>
        const starsContainer = document.getElementById('stars');
        const starCount = 80;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = Math.random() * 2 + 2 + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
